<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vintage Print</title>
      <link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#ffffff;--bg2:#f5f5f3;--bg3:#efefec;
    --text:#1a1a1a;--text2:#555550;--text3:#999992;
    --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
    --warn-bg:#fffbf0;--warn-border:#d4880a;--warn-text:#7a4f00;
    --tip-bg:#f0f6ff;--tip-border:#3a7abf;--tip-text:#1a4a7a;
    --r8:8px;--r12:12px;--r20:20px;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#141414;--bg2:#1e1e1c;--bg3:#282826;
      --text:#e8e8e0;--text2:#aaa89a;--text3:#66665e;
      --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
      --warn-bg:#1e1800;--warn-border:#b07820;--warn-text:#e0b060;
      --tip-bg:#001428;--tip-border:#3a6aaf;--tip-text:#80aad8;
    }
  }
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
  .container{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}

  .hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border)}
  .hd-title{font-size:22px;font-weight:600;letter-spacing:-.4px;line-height:1.2;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .hd-title:hover{opacity:.75}

  .search-wrap{position:relative;margin-bottom:1rem}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
  .search-wrap input{width:100%;padding:10px 12px 10px 35px;font-size:14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r8);color:var(--text);outline:none;-webkit-appearance:none}
  .search-wrap input::placeholder{color:var(--text3)}
  .search-wrap input:focus{border-color:var(--border2)}

  .filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
  .ftag{font-size:12px;padding:5px 13px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .ftag.on{background:var(--text);color:var(--bg);border-color:var(--text)}

  .grid{display:grid;grid-template-columns:1fr;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  @media(min-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(min-width:760px){.grid{grid-template-columns:repeat(3,1fr)}}

  .pcard{background:var(--bg);padding:1.25rem 1.25rem 1.1rem;cursor:pointer;transition:background .1s;position:relative;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border)}
  .pcard:hover{background:var(--bg2)}
  .pcard:active{background:var(--bg3)}
  .pcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
  .pcard-titles{}
  .pcard-name{font-size:15px;font-weight:700;line-height:1.2;color:var(--text)}
  .pcard-en{font-size:12px;color:var(--text3);margin-top:3px}
  .pcard-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .pcard-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .pcard-foot{display:flex;gap:14px;font-size:12px;color:var(--text3)}
  .pcard-foot-item{display:flex;align-items:center;gap:4px}
  .pcard-foot-icon{width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .memo-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;margin-left:5px;vertical-align:2px;opacity:.5}

  .detail{display:none}
  .detail.on{display:block}

  .det-nav{display:flex;align-items:center;gap:6px;margin-bottom:1.5rem}
  .det-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:0.5px solid var(--border);border-radius:var(--r8);padding:6px 12px;transition:background .1s;-webkit-tap-highlight-color:transparent}
  .det-back:hover{background:var(--bg2)}
  .det-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .det-sep{color:var(--border2);font-size:13px}
  .det-crumb{font-size:13px;color:var(--text);font-weight:500}

  .det-hero{display:flex;gap:12px;padding-bottom:1.25rem;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
  .det-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch}
  .det-title{font-size:24px;font-weight:600;letter-spacing:-.4px;line-height:1.2}
  .det-en{font-size:13px;color:var(--text3);font-style:italic;margin-top:4px}
  .det-cat{font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:8px;display:inline-block;font-weight:600}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1.5rem}
  .stat{background:var(--bg2);border-radius:var(--r8);padding:10px 12px;border:0.5px solid var(--border)}
  .stat-val{font-size:13px;font-weight:600;word-break:break-all}
  .stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

  .det-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:.5rem}

  .sec-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:1.5rem;display:flex;align-items:center;gap:8px}
  .sec-lbl::after{content:'';flex:1;height:0.5px;background:var(--border)}

  .ing-list{border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  .ing-row{border-bottom:0.5px solid var(--border);font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
  .ing-row:last-child{border-bottom:none}
  .ing-row:nth-child(odd){background:var(--bg2)}
  .ing-row:nth-child(odd).open{background:var(--bg2)}
  .ing-row:nth-child(even).open{background:var(--bg)}
  .ing-row:hover{filter:brightness(.97)}
  .ing-header{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;gap:8px}
  .ing-n{color:var(--text);flex:1;font-weight:500}
  .ing-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .ing-a{color:var(--text3);font-size:12px;white-space:nowrap}
  .ing-chevron{font-size:14px;color:var(--text3);transition:transform .2s;line-height:1;flex-shrink:0}
  .ing-row.open .ing-chevron{transform:rotate(180deg)}
  .ing-body{display:none;padding:0 13px 10px;font-size:12px;color:var(--text2);line-height:1.6;border-top:0.5px dashed var(--border)}
  .ing-row.open .ing-body{display:block}

  .dev-list{border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  .dev-row{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:0.5px solid var(--border);font-size:13px;gap:8px}
  .dev-row:last-child{border-bottom:none}
  .dev-row:nth-child(odd){background:var(--bg2)}
  .dev-tone{color:var(--text2);flex:1}
  .dev-method{color:var(--text);font-size:12px;text-align:right}

  .steps{margin-top:4px}
  .step{display:flex;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.65;color:var(--text2)}
  .step-sub{font-size:12px;color:var(--text3);margin-top:3px;font-style:italic}
  .snum{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);margin-top:2px}

  .notice{border-radius:0 var(--r8) var(--r8) 0;padding:10px 13px;font-size:13px;line-height:1.65;margin-top:.65rem;border-left:2px solid}
  .notice-label{font-weight:600;margin-bottom:4px;font-size:12px;letter-spacing:.03em}
  .notice-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text)}
  .notice-tip{background:var(--tip-bg);border-color:var(--tip-border);color:var(--tip-text)}
  .notice ul{margin:6px 0 0 16px}
  .notice li{margin-bottom:3px}

  .ratio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px}
  .ratio-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r8);padding:10px;text-align:center}
  .ratio-val{font-size:18px;font-weight:600;color:var(--text)}
  .ratio-lbl{font-size:11px;color:var(--text3);margin-top:3px}

  .empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;background:var(--bg);grid-column:1/-1}

  .memo-wrap{margin-top:1.5rem;padding-top:1.5rem;border-top:0.5px solid var(--border)}
  .memo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .memo-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
  .memo-saved{font-size:11px;color:var(--text3);opacity:0;transition:opacity .4s}
  .memo-saved.show{opacity:1}
  .memo-textarea{width:100%;min-height:120px;padding:11px 13px;font-size:16px;line-height:1.65;font-family:inherit;color:var(--text);background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r12);resize:vertical;outline:none;-webkit-appearance:none;transition:border-color .15s}
  .memo-textarea:focus{border-color:var(--border2)}
  .memo-textarea::placeholder{color:var(--text3)}

  /* 탭 */
  .tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
  .tab-btn{font-size:14px;font-weight:500;padding:8px 0;margin-right:24px;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
  .tab-btn.on{color:var(--text);border-bottom-color:var(--text)}

  /* 참고자료 탭 */
  /* 탭 슬라이더 */
  .tab-slider-wrap{overflow:hidden;width:100%}
  .tab-slider{display:flex;width:200%;transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .tab-slider.notransition{transition:none}
  .tab-pane{width:50%;flex-shrink:0;min-width:0}

  .ref-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
  .ref-ftag{font-size:12px;padding:5px 13px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .ref-ftag.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .ref-grid{display:flex;flex-direction:column;gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  .ref-card{background:var(--bg);padding:1.1rem 1.25rem;cursor:pointer;transition:background .1s}
  .ref-card:hover{background:var(--bg2)}
  .ref-card:active{background:var(--bg3)}
  .ref-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:5px}
  .ref-card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
  .ref-card-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px}
  .ref-card-desc{font-size:12px;color:var(--text2);line-height:1.55}

  /* 참고자료 상세 */
  .ref-detail{display:none}
  .ref-detail.on{display:block}
  .ref-spec-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden;margin-top:4px}
  .ref-spec-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 13px;background:var(--bg);font-size:13px;gap:8px;border-bottom:0.5px solid var(--border)}
  .ref-spec-row:last-child{border-bottom:none}
  .ref-spec-row:nth-child(odd){background:var(--bg2)}
  .ref-spec-k{color:var(--text2);flex-shrink:0;min-width:90px}
  .ref-spec-v{color:var(--text);text-align:right;font-weight:500}
  .ref-tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .ref-tag{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--bg2);border:0.5px solid var(--border);color:var(--text2)}

  /* 계산기 */
  .calc-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
  @media(min-width:520px){.calc-picker{grid-template-columns:repeat(3,1fr)}}
  .calc-pick-btn{padding:10px 8px;border:0.5px solid var(--border);border-radius:var(--r8);background:var(--bg);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .12s;line-height:1.3;-webkit-tap-highlight-color:transparent}
  .calc-pick-btn:hover{background:var(--bg2)}
  .calc-pick-btn.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .calc-pick-btn .pick-en{display:block;font-size:10px;font-weight:400;margin-top:2px;opacity:.6}

  .calc-panel{display:none}
  .calc-panel.on{display:block}

  .calc-section{margin-bottom:1.5rem;padding:1rem 1.1rem;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r12)}
  .calc-section-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
  .calc-section-title::after{content:'';flex:1;height:0.5px;background:var(--border)}

  .calc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .calc-label{font-size:13px;color:var(--text2);flex:1;min-width:0}
  .calc-input-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .calc-input{width:72px;font-size:14px;font-weight:500;text-align:right;padding:6px 8px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r8);color:var(--text);-webkit-appearance:none;outline:none}
  .calc-input:focus{border-color:var(--text3)}
  .calc-unit{font-size:12px;color:var(--text3);width:24px}

  .calc-result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-top:.75rem}
  .calc-result-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r8);padding:10px 12px}
  .calc-result-name{font-size:11px;color:var(--text3);margin-bottom:3px}
  .calc-result-val{font-size:18px;font-weight:600;color:var(--text)}
  .calc-result-unit{font-size:11px;color:var(--text3);margin-left:2px;font-weight:400}

  .calc-slider-wrap{margin-top:.5rem}
  .calc-slider-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .calc-slider-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0}
  .calc-slider-val{font-size:13px;font-weight:600;color:var(--text);width:28px;text-align:right;flex-shrink:0}
  .calc-slider{flex:1}
  .calc-ratio-display{display:flex;gap:6px;margin-top:.6rem}
  .calc-ratio-box{flex:1;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r8);padding:8px 10px;text-align:center}
  .calc-ratio-name{font-size:10px;color:var(--text3);margin-bottom:3px}
  .calc-ratio-val{font-size:15px;font-weight:600;color:var(--text)}
  .calc-ratio-unit{font-size:10px;color:var(--text3)}

  .calc-warn{font-size:12px;color:var(--warn-text);background:var(--warn-bg);border-left:2px solid var(--warn-border);border-radius:0 var(--r8) var(--r8) 0;padding:8px 11px;margin-top:.75rem;line-height:1.55}

  /* 메모 탭 */
  .memo-tab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .memo-tab-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
  .memo-tab-add{font-size:13px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s}
  .memo-tab-add:hover{background:var(--bg2)}
  .memo-list{display:flex;flex-direction:column;gap:8px}
  .memo-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);padding:1rem 1.1rem;cursor:pointer;transition:background .1s;position:relative}
  .memo-item:hover{background:var(--bg2)}
  .memo-item-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;padding-right:28px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .memo-item-preview{font-size:12px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .memo-item-date{font-size:11px;color:var(--text3);margin-top:8px}
  .memo-item-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;-webkit-tap-highlight-color:transparent}
  .memo-item-del:hover{background:var(--bg3);color:var(--text)}
  .memo-empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}

  .memo-editor{display:none}
  .memo-editor.on{display:block}
  .memo-editor-nav{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
  .memo-editor-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:0.5px solid var(--border);border-radius:var(--r8);padding:6px 12px;-webkit-tap-highlight-color:transparent}
  .memo-editor-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .memo-editor-confirm{font-size:13px;font-weight:600;padding:6px 16px;border-radius:20px;border:none;background:var(--text);color:var(--bg);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .12s}
  .memo-editor-confirm:hover{opacity:.8}
  .memo-editor-saved{font-size:11px;color:var(--text3);margin-left:auto;opacity:0;transition:opacity .4s}
  .memo-editor-saved.show{opacity:1}
  .memo-title-input{width:100%;font-size:18px;font-weight:600;color:var(--text);background:transparent;border:none;outline:none;margin-bottom:.75rem;padding:0;-webkit-appearance:none}
  .memo-title-input::placeholder{color:var(--text3)}
  .memo-divider{height:0.5px;background:var(--border);margin-bottom:.75rem}
  .memo-body-input{width:100%;min-height:360px;font-size:16px;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.7;padding:0;-webkit-appearance:none;font-family:inherit}
  .memo-body-input::placeholder{color:var(--text3)}

  .paper-list{display:flex;flex-direction:column;gap:6px}
  .paper-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r8);padding:10px 13px}
  .paper-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
  .paper-note{font-size:12px;color:var(--text3);line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <!-- 공통 헤더 -->
  <div class="hd">
    <div class="hd-title" onclick="goMainHome()">Vintage Print<br>Handbook</div>
  </div>

  <!-- 탭 바 -->
  <div class="tab-bar">
    <button class="tab-btn on" id="tabTech" onclick="switchTab(0)">기법</button>
    <button class="tab-btn" id="tabRef" onclick="switchTab(1)">참고자료</button>
    <button class="tab-btn" id="tabCalc" onclick="switchTab(2)">계산기</button>
    <button class="tab-btn" id="tabMemo" onclick="switchTab(3)">메모</button>
  </div>

  <!-- 슬라이더 래퍼 -->
  <div class="tab-slider-wrap" id="sliderWrap">
    <div class="tab-slider" id="tabSlider" style="width:400%">

      <!-- 기법 탭 (pane 0) -->
      <div class="tab-pane" style="width:25%">

const CATS=['전체','크로메이트','철염','귀금속','은염'];
let activeCat='전체', searchQ='';

function loadMemo(id){
  try { return localStorage.getItem('vph_memo_'+id) || ''; } catch(e){ return ''; }
}

let memoTimer = null;
function saveMemo(id, val){
  try { localStorage.setItem('vph_memo_'+id, val); } catch(e){}
  const el = document.getElementById('memoSaved');
  if(!el) return;
  clearTimeout(memoTimer);
  el.classList.add('show');
  memoTimer = setTimeout(()=>{ el.classList.remove('show'); }, 1800);
}

function toggleIng(id){
  const row = document.getElementById(id);
  if(!row) return;
  row.classList.toggle('open');
}

function normalize(s){ return s.replace(/\s+/g,'').toLowerCase(); }

function buildFilters(){
  document.getElementById('filters').innerHTML=CATS.map(c=>
    `<span class="ftag${c==='전체'?' on':''}" onclick="setCat('${c}',this)">${c}</span>`
  ).join('');
}
function setCat(c,el){
  activeCat=c;
  document.querySelectorAll('.ftag').forEach(f=>f.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
}
function doSearch(q){ searchQ=normalize(q); renderGrid(); }
function filtered(){
  return DATA.filter(p=>{
    const mc = activeCat==='전체' || p.cat===activeCat;
    const mq = !searchQ ||
      normalize(p.name).includes(searchQ) ||
      normalize(p.en).includes(searchQ) ||
      normalize(p.desc).includes(searchQ) ||
      normalize(p.cat).includes(searchQ);
    return mc && mq;
  });
}

function renderGrid(){
  const list=filtered();
  const grid=document.getElementById('grid');
  if(!list.length){
    grid.style.background='transparent';
    grid.innerHTML='<div class="empty">검색 결과가 없습니다</div>';
    return;
  }
  // 카드가 그리드를 꽉 채우지 않을 때 빈 셀 회색 방지
  // grid background를 투명으로 두고 카드 자체 border로만 구분
  grid.style.background='var(--bg)';
  grid.innerHTML=list.map(p=>{
    const c=CC[p.cat]||'#888';
    const calSvg=`<svg class="pcard-foot-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
    const timeSvg=`<svg class="pcard-foot-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>`;
    const diffSvg=`<svg class="pcard-foot-icon" viewBox="0 0 24 24"><line x1="4" y1="20" x2="4" y2="14"/><line x1="10" y1="20" x2="10" y2="10"/><line x1="16" y1="20" x2="16" y2="4"/><line x1="22" y1="20" x2="22" y2="8"/></svg>`;
    return `<div class="pcard" onclick="openDetail('${p.id}')">
      <div class="pcard-top">
        <div class="pcard-titles">
          <div class="pcard-name">${p.name}</div>
          <div class="pcard-en">${p.en}</div>
        </div>
        <div class="pcard-dot" style="background:${c}"></div>
      </div>
      <div class="pcard-desc">${p.desc}</div>
      <div class="pcard-foot">
        <span class="pcard-foot-item">${calSvg}${p.year}</span>
        <span class="pcard-foot-item">${timeSvg}${p.time}</span>
        <span class="pcard-foot-item">${diffSvg}${p.diff}</span>
      </div>
    </div>`;
  }).join('');

  // 빈 셀: 배경색 동일한 더미 채우기
  const w = grid.offsetWidth;
  const cols = w >= 760 ? 3 : w >= 520 ? 2 : 1;
  const rem = list.length % cols;
  if(rem !== 0){
    const fill = cols - rem;
    for(let i=0;i<fill;i++){
      const d=document.createElement('div');
      d.style.cssText='background:var(--bg);border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border)';
      grid.appendChild(d);
    }
  }
}

let currentTab = 0;

function switchTab(idx){
  currentTab = idx;
  ['tabTech','tabRef','tabCalc','tabMemo'].forEach((id,i)=>
    document.getElementById(id).classList.toggle('on', i===idx));
  const pct = idx * (-100/4);
  document.getElementById('tabSlider').style.transform = `translateX(${pct}%)`;
  if(idx===1) renderRefGrid();
  if(idx===2) renderCalc();
  if(idx===3) renderMemoTab();
  window.scrollTo(0,0);
}

/* 스와이프 제스처 */
(function(){
  const wrap = document.getElementById('sliderWrap');
  let startX=0, startY=0, moved=false, locked=false;
  wrap.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false; locked = false;
  }, {passive:true});
  wrap.addEventListener('touchmove', e=>{
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if(!locked){
      if(Math.abs(dy) > Math.abs(dx)){ locked = true; return; }
      locked = true;
    }
    if(Math.abs(dy) > Math.abs(dx)) return;
    moved = true;
  }, {passive:true});
  wrap.addEventListener('touchend', e=>{
    if(!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    if(dx < 0 && currentTab < 3) switchTab(currentTab + 1);
    else if(dx > 0 && currentTab > 0) switchTab(currentTab - 1);
  }, {passive:true});
})();

function openRefDetail(id){

let calcSelected = 'gum';

function renderCalc(){
  const el = document.getElementById('calcView');
  el.innerHTML = `
    <div class="calc-picker" id="calcPicker">
      ${CALC_TECHS.map(t=>`
        <button class="calc-pick-btn${t.id===calcSelected?' on':''}" onclick="selectCalc('${t.id}')">
          ${t.name}<span class="pick-en">${t.en}</span>
        </button>`).join('')}

  `;
  renderCalcBody();
}

function selectCalc(id){
  calcSelected = id;
  document.querySelectorAll('.calc-pick-btn').forEach(b=>{
    b.classList.toggle('on', b.textContent.trim().startsWith(
      CALC_TECHS.find(t=>t.id===id).name));
  });
  renderCalcBody();
}

function fmt(n){ return Number(n.toFixed(2)).toString(); }

function renderCalcBody(){
  const el = document.getElementById('calcBody');

  const panels = {

    palladium: palladiumPanel, kallitype: kallitypePanel,

function calcGum(){
  const total = parseFloat(document.getElementById('g_total').value)||24;
  const half = total/2;
  // 수채물감: 감광액 총량의 약 5–8% 무게 기준 (총량 24ml 기준 약 1–2g)
  const pigment = total * 0.06;
  document.getElementById('g_res1').innerHTML = `
    <div class="calc-result-card"><div class="calc-result-name">아라비아 고무액</div><div class="calc-result-val">${fmt(half)}<span class="calc-result-unit">ml</span></div></div>
    <div class="calc-result-card"><div class="calc-result-name">중크롬산염 용액</div><div class="calc-result-val">${fmt(half)}<span class="calc-result-unit">ml</span></div></div>
    <div class="calc-result-card"><div class="calc-result-name">수채물감 (기준)</div><div class="calc-result-val">${fmt(pigment)}<span class="calc-result-unit">g</span></div></div>`;
}
function calcGumRatio(){
  const gr = parseInt(document.getElementById('g_gum_r').value);
  const dr = parseInt(document.getElementById('g_dic_r').value);
  document.getElementById('g_gum_v').textContent = gr;
  document.getElementById('g_dic_v').textContent = dr;
  const total = gr + dr;
  document.getElementById('g_ratio').innerHTML = `
    <div class="calc-ratio-box"><div class="calc-ratio-name">아라비아 고무</div><div class="calc-ratio-val">${gr}<span class="calc-ratio-unit"> drops</span></div></div>
    <div class="calc-ratio-box"><div class="calc-ratio-name">중크롬산염</div><div class="calc-ratio-val">${dr}<span class="calc-ratio-unit"> drops</span></div></div>
    <div class="calc-ratio-box"><div class="calc-ratio-name">비율</div><div class="calc-ratio-val">${gr}:${dr}</div></div>`;
  let tip = '';
  if(gr > dr) tip = `고무 비율↑ → 콘트라스트 강화, 현상 시간 길어짐`;
  else if(dr > gr) tip = `감광액 비율↑ → 감광 속도↑, 콘트라스트↓`;
  else tip = `1:1 기본 비율 — 가장 균형 잡힌 설정`;
  document.getElementById('g_ratio_tip').textContent = tip;
}
function calcGumConc(){
  const conc = parseFloat(document.getElementById('g_conc').value)||10;
  const vol = parseFloat(document.getElementById('g_conc_vol').value)||100;
  const solute = vol * conc / 100;
  const solvent = vol - solute;
  document.getElementById('g_conc_res').innerHTML = `
    <div class="calc-result-card"><div class="calc-result-name">중크롬산암모늄</div><div class="calc-result-val">${fmt(solute)}<span class="calc-result-unit">g</span></div></div>
    <div class="calc-result-card"><div class="calc-result-name">정제수</div><div class="calc-result-val">${fmt(solvent)}<span class="calc-result-unit">ml</span></div></div>
    <div class="calc-result-card"><div class="calc-result-name">완성 용액</div><div class="calc-result-val">${fmt(vol)}<span class="calc-result-unit">ml</span></div></div>`;
}

/* ══════════════════════════════
   메모 탭
══════════════════════════════ */
const MEMO_KEY = 'vph_memos_v1';
let memoEditingId = null;
let memoSaveTimer = null;

function loadMemos(){
  try { return JSON.parse(localStorage.getItem(MEMO_KEY)) || []; } catch(e){ return []; }
}
function saveMemos(list){
  try { localStorage.setItem(MEMO_KEY, JSON.stringify(list)); } catch(e){}
}
function genId(){ return 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }
function fmtDate(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderMemoTab(){
  const el = document.getElementById('memoTabView');
  const list = loadMemos();

  // 목록 뷰와 에디터 뷰를 완전히 분리해서 렌더
  el.innerHTML = '';

  // ── 목록 뷰 ──
  const listView = document.createElement('div');
  listView.id = 'memoListView';

  const header = document.createElement('div');
  header.className = 'memo-tab-header';
  header.innerHTML = `
    <span class="memo-tab-title">메모${list.length > 0 ? ' ' + list.length + '개' : ''}</span>
    <button class="memo-tab-add">+ 새 메모</button>`;
  header.querySelector('.memo-tab-add').addEventListener('click', ()=>openMemoEditor(null));
  listView.appendChild(header);

  if(list.length === 0){
    const empty = document.createElement('div');
    empty.className = 'memo-empty';
    empty.innerHTML = '아직 메모가 없어요.<br>새 메모를 작성해보세요.';
    listView.appendChild(empty);
  } else {
    const memoList = document.createElement('div');
    memoList.className = 'memo-list';
    list.forEach(m=>{
      const item = document.createElement('div');
      item.className = 'memo-item';

      const titleEl = document.createElement('div');
      titleEl.className = 'memo-item-title';
      titleEl.textContent = m.title || '제목 없음';

      const previewEl = document.createElement('div');
      previewEl.className = 'memo-item-preview';
      previewEl.textContent = m.body || '내용 없음';

      const dateEl = document.createElement('div');
      dateEl.className = 'memo-item-date';
      dateEl.textContent = fmtDate(m.updatedAt);

      const delBtn = document.createElement('button');
      delBtn.className = 'memo-item-del';
      delBtn.setAttribute('aria-label', '삭제');
      delBtn.textContent = '×';
      delBtn.addEventListener('click', e=>{
        e.stopPropagation();
        deleteMemo(m.id);
      });

      item.appendChild(titleEl);
      item.appendChild(previewEl);
      item.appendChild(dateEl);
      item.appendChild(delBtn);
      item.addEventListener('click', ()=>openMemoEditor(m.id));
      memoList.appendChild(item);
    });
    listView.appendChild(memoList);
  }

  // ── 에디터 뷰 ──
  const editorView = document.createElement('div');
  editorView.className = 'memo-editor';
  editorView.id = 'memoEditorView';

  const nav = document.createElement('div');
  nav.className = 'memo-editor-nav';

  const backBtn = document.createElement('button');
  backBtn.className = 'memo-editor-back';
  backBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>목록`;
  backBtn.addEventListener('click', closeMemoEditor);

  const savedSpan = document.createElement('span');
  savedSpan.className = 'memo-editor-saved';
  savedSpan.id = 'memoEditorSaved';
  savedSpan.textContent = '저장됨';

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'memo-editor-confirm';
  confirmBtn.textContent = '확인';
  confirmBtn.addEventListener('click', confirmMemo);

  nav.appendChild(backBtn);
  nav.appendChild(savedSpan);
  nav.appendChild(confirmBtn);

  const titleInput = document.createElement('input');
  titleInput.className = 'memo-title-input';
  titleInput.id = 'memoTitleInput';
  titleInput.type = 'text';
  titleInput.placeholder = '제목';
  titleInput.maxLength = 80;
  titleInput.addEventListener('input', autoSaveMemo);

  const divider = document.createElement('div');
  divider.className = 'memo-divider';

  const bodyInput = document.createElement('textarea');
  bodyInput.className = 'memo-body-input';
  bodyInput.id = 'memoBodyInput';
  bodyInput.placeholder = '내용을 입력하세요…';
  bodyInput.addEventListener('input', autoSaveMemo);

  editorView.appendChild(nav);
  editorView.appendChild(titleInput);
  editorView.appendChild(divider);
  editorView.appendChild(bodyInput);

  el.appendChild(listView);
  el.appendChild(editorView);
}

function openMemoEditor(id){
  const listView   = document.getElementById('memoListView');
  const editorView = document.getElementById('memoEditorView');
  if(!listView || !editorView) return;

  if(id){
    memoEditingId = id;
    const memo = loadMemos().find(m=>m.id===id);
    if(memo){
      document.getElementById('memoTitleInput').value = memo.title || '';
      document.getElementById('memoBodyInput').value  = memo.body  || '';
    }
  } else {
    const newMemo = {id:genId(), title:'', body:'', createdAt:Date.now(), updatedAt:Date.now()};
    memoEditingId = newMemo.id;
    const list = loadMemos();
    list.unshift(newMemo);
    saveMemos(list);
    document.getElementById('memoTitleInput').value = '';
    document.getElementById('memoBodyInput').value  = '';
  }

  listView.style.display   = 'none';
  editorView.classList.add('on');
  setTimeout(()=>{ const t=document.getElementById('memoTitleInput'); if(t) t.focus(); }, 80);
  window.scrollTo(0,0);
}

function closeMemoEditor(){
  clearTimeout(memoSaveTimer);
  if(memoEditingId){
    const list  = loadMemos();
    const idx   = list.findIndex(m=>m.id===memoEditingId);
    const title = (document.getElementById('memoTitleInput')||{}).value || '';
    const body  = (document.getElementById('memoBodyInput') ||{}).value || '';
    if(idx >= 0){
      if(!title && !body){
        saveMemos(list.filter(m=>m.id!==memoEditingId));
      } else {
        list[idx].title = title;
        list[idx].body  = body;
        list[idx].updatedAt = Date.now();
        saveMemos(list);
      }
    }
  }
  memoEditingId = null;
  renderMemoTab();
}

function confirmMemo(){
  clearTimeout(memoSaveTimer);
  if(!memoEditingId) return;
  const list  = loadMemos();
  const idx   = list.findIndex(m=>m.id===memoEditingId);
  const title = (document.getElementById('memoTitleInput')||{}).value || '';
  const body  = (document.getElementById('memoBodyInput') ||{}).value || '';
  if(idx >= 0){
    list[idx].title = title;
    list[idx].body  = body;
    list[idx].updatedAt = Date.now();
    saveMemos(list);
  }
  const saved = document.getElementById('memoEditorSaved');
  if(saved){ saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 1600); }
  memoEditingId = null;
  renderMemoTab();
}

function autoSaveMemo(){
  clearTimeout(memoSaveTimer);
  memoSaveTimer = setTimeout(()=>{
    if(!memoEditingId) return;
    const list  = loadMemos();
    const idx   = list.findIndex(m=>m.id===memoEditingId);
    const title = (document.getElementById('memoTitleInput')||{}).value || '';
    const body  = (document.getElementById('memoBodyInput') ||{}).value || '';
    if(idx >= 0){
      list[idx].title = title;
      list[idx].body  = body;
      list[idx].updatedAt = Date.now();
    } else {
      list.unshift({id:memoEditingId, title, body, createdAt:Date.now(), updatedAt:Date.now()});
    }
    saveMemos(list);
    const saved = document.getElementById('memoEditorSaved');
    if(saved){ saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 1600); }
  }, 600);
}

function deleteMemo(id){
  saveMemos(loadMemos().filter(m=>m.id!==id));
  renderMemoTab();
}

buildRefFilters();
buildFilters();
renderGrid();
window.addEventListener('resize', ()=>{ renderGrid(); });
</script>

  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
  .container{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem}

  .hd{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--border)}
  .hd-title{font-size:22px;font-weight:600;letter-spacing:-.4px;line-height:1.2;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .hd-title:hover{opacity:.75}

  .search-wrap{position:relative;margin-bottom:1rem}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
  .search-wrap input{width:100%;padding:10px 12px 10px 35px;font-size:14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r8);color:var(--text);outline:none;-webkit-appearance:none}
  .search-wrap input::placeholder{color:var(--text3)}
  .search-wrap input:focus{border-color:var(--border2)}

  .filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
  .ftag{font-size:12px;padding:5px 13px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .ftag.on{background:var(--text);color:var(--bg);border-color:var(--text)}

  .grid{display:grid;grid-template-columns:1fr;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  @media(min-width:520px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(min-width:760px){.grid{grid-template-columns:repeat(3,1fr)}}

  .pcard{background:var(--bg);padding:1.25rem 1.25rem 1.1rem;cursor:pointer;transition:background .1s;position:relative;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border)}
  .pcard:hover{background:var(--bg2)}
  .pcard:active{background:var(--bg3)}
  .pcard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
  .pcard-titles{}
  .pcard-name{font-size:15px;font-weight:700;line-height:1.2;color:var(--text)}
  .pcard-en{font-size:12px;color:var(--text3);margin-top:3px}
  .pcard-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
  .pcard-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .pcard-foot{display:flex;gap:14px;font-size:12px;color:var(--text3)}
  .pcard-foot-item{display:flex;align-items:center;gap:4px}
  .pcard-foot-icon{width:13px;height:13px;stroke:var(--text3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
  .memo-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;margin-left:5px;vertical-align:2px;opacity:.5}

  .detail{display:none}
  .detail.on{display:block}

  .det-nav{display:flex;align-items:center;gap:6px;margin-bottom:1.5rem}
  .det-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:0.5px solid var(--border);border-radius:var(--r8);padding:6px 12px;transition:background .1s;-webkit-tap-highlight-color:transparent}
  .det-back:hover{background:var(--bg2)}
  .det-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .det-sep{color:var(--border2);font-size:13px}
  .det-crumb{font-size:13px;color:var(--text);font-weight:500}

  .det-hero{display:flex;gap:12px;padding-bottom:1.25rem;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
  .det-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch}
  .det-title{font-size:24px;font-weight:600;letter-spacing:-.4px;line-height:1.2}
  .det-en{font-size:13px;color:var(--text3);font-style:italic;margin-top:4px}
  .det-cat{font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-top:8px;display:inline-block;font-weight:600}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:1.5rem}
  .stat{background:var(--bg2);border-radius:var(--r8);padding:10px 12px;border:0.5px solid var(--border)}
  .stat-val{font-size:13px;font-weight:600;word-break:break-all}
  .stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

  .det-desc{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:.5rem}

  .sec-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:1.5rem;display:flex;align-items:center;gap:8px}
  .sec-lbl::after{content:'';flex:1;height:0.5px;background:var(--border)}

  .ing-list{border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  .ing-row{border-bottom:0.5px solid var(--border);font-size:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
  .ing-row:last-child{border-bottom:none}
  .ing-row:nth-child(odd){background:var(--bg2)}
  .ing-row:nth-child(odd).open{background:var(--bg2)}
  .ing-row:nth-child(even).open{background:var(--bg)}
  .ing-row:hover{filter:brightness(.97)}
  .ing-header{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;gap:8px}
  .ing-n{color:var(--text);flex:1;font-weight:500}
  .ing-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .ing-a{color:var(--text3);font-size:12px;white-space:nowrap}
  .ing-chevron{font-size:14px;color:var(--text3);transition:transform .2s;line-height:1;flex-shrink:0}
  .ing-row.open .ing-chevron{transform:rotate(180deg)}
  .ing-body{display:none;padding:0 13px 10px;font-size:12px;color:var(--text2);line-height:1.6;border-top:0.5px dashed var(--border)}
  .ing-row.open .ing-body{display:block}

  .dev-list{border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  .dev-row{display:flex;justify-content:space-between;align-items:center;padding:9px 13px;border-bottom:0.5px solid var(--border);font-size:13px;gap:8px}
  .dev-row:last-child{border-bottom:none}
  .dev-row:nth-child(odd){background:var(--bg2)}
  .dev-tone{color:var(--text2);flex:1}
  .dev-method{color:var(--text);font-size:12px;text-align:right}

  .steps{margin-top:4px}
  .step{display:flex;gap:10px;margin-bottom:10px;font-size:13px;line-height:1.65;color:var(--text2)}
  .step-sub{font-size:12px;color:var(--text3);margin-top:3px;font-style:italic}
  .snum{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--text3);margin-top:2px}

  .notice{border-radius:0 var(--r8) var(--r8) 0;padding:10px 13px;font-size:13px;line-height:1.65;margin-top:.65rem;border-left:2px solid}
  .notice-label{font-weight:600;margin-bottom:4px;font-size:12px;letter-spacing:.03em}
  .notice-warn{background:var(--warn-bg);border-color:var(--warn-border);color:var(--warn-text)}
  .notice-tip{background:var(--tip-bg);border-color:var(--tip-border);color:var(--tip-text)}
  .notice ul{margin:6px 0 0 16px}
  .notice li{margin-bottom:3px}

  .ratio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px}
  .ratio-box{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r8);padding:10px;text-align:center}
  .ratio-val{font-size:18px;font-weight:600;color:var(--text)}
  .ratio-lbl{font-size:11px;color:var(--text3);margin-top:3px}

  .empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px;background:var(--bg);grid-column:1/-1}

  .memo-wrap{margin-top:1.5rem;padding-top:1.5rem;border-top:0.5px solid var(--border)}
  .memo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .memo-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
  .memo-saved{font-size:11px;color:var(--text3);opacity:0;transition:opacity .4s}
  .memo-saved.show{opacity:1}
  .memo-textarea{width:100%;min-height:120px;padding:11px 13px;font-size:16px;line-height:1.65;font-family:inherit;color:var(--text);background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r12);resize:vertical;outline:none;-webkit-appearance:none;transition:border-color .15s}
  .memo-textarea:focus{border-color:var(--border2)}
  .memo-textarea::placeholder{color:var(--text3)}

  /* 탭 */
  .tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
  .tab-btn{font-size:14px;font-weight:500;padding:8px 0;margin-right:24px;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s,border-color .15s;-webkit-tap-highlight-color:transparent}
  .tab-btn.on{color:var(--text);border-bottom-color:var(--text)}

  /* 참고자료 탭 */
  /* 탭 슬라이더 */
  .tab-slider-wrap{overflow:hidden;width:100%}
  .tab-slider{display:flex;width:200%;transition:transform .3s cubic-bezier(.4,0,.2,1)}
  .tab-slider.notransition{transition:none}
  .tab-pane{width:50%;flex-shrink:0;min-width:0}

  .ref-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.25rem}
  .ref-ftag{font-size:12px;padding:5px 13px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
  .ref-ftag.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .ref-grid{display:flex;flex-direction:column;gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden}
  .ref-card{background:var(--bg);padding:1.1rem 1.25rem;cursor:pointer;transition:background .1s}
  .ref-card:hover{background:var(--bg2)}
  .ref-card:active{background:var(--bg3)}
  .ref-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:5px}
  .ref-card-name{font-size:14px;font-weight:700;color:var(--text);line-height:1.3}
  .ref-card-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;margin-top:2px}
  .ref-card-desc{font-size:12px;color:var(--text2);line-height:1.55}

  /* 참고자료 상세 */
  .ref-detail{display:none}
  .ref-detail.on{display:block}
  .ref-spec-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:0.5px solid var(--border);border-radius:var(--r12);overflow:hidden;margin-top:4px}
  .ref-spec-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 13px;background:var(--bg);font-size:13px;gap:8px;border-bottom:0.5px solid var(--border)}
  .ref-spec-row:last-child{border-bottom:none}
  .ref-spec-row:nth-child(odd){background:var(--bg2)}
  .ref-spec-k{color:var(--text2);flex-shrink:0;min-width:90px}
  .ref-spec-v{color:var(--text);text-align:right;font-weight:500}
  .ref-tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .ref-tag{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--bg2);border:0.5px solid var(--border);color:var(--text2)}

  /* 계산기 */
  .calc-picker{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
  @media(min-width:520px){.calc-picker{grid-template-columns:repeat(3,1fr)}}
  .calc-pick-btn{padding:10px 8px;border:0.5px solid var(--border);border-radius:var(--r8);background:var(--bg);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .12s;line-height:1.3;-webkit-tap-highlight-color:transparent}
  .calc-pick-btn:hover{background:var(--bg2)}
  .calc-pick-btn.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .calc-pick-btn .pick-en{display:block;font-size:10px;font-weight:400;margin-top:2px;opacity:.6}

  .calc-panel{display:none}
  .calc-panel.on{display:block}

  .calc-section{margin-bottom:1.5rem;padding:1rem 1.1rem;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r12)}
  .calc-section-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:.9rem;display:flex;align-items:center;gap:8px}
  .calc-section-title::after{content:'';flex:1;height:0.5px;background:var(--border)}

  .calc-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .calc-label{font-size:13px;color:var(--text2);flex:1;min-width:0}
  .calc-input-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .calc-input{width:72px;font-size:14px;font-weight:500;text-align:right;padding:6px 8px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--r8);color:var(--text);-webkit-appearance:none;outline:none}
  .calc-input:focus{border-color:var(--text3)}
  .calc-unit{font-size:12px;color:var(--text3);width:24px}

  .calc-result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-top:.75rem}
  .calc-result-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r8);padding:10px 12px}
  .calc-result-name{font-size:11px;color:var(--text3);margin-bottom:3px}
  .calc-result-val{font-size:18px;font-weight:600;color:var(--text)}
  .calc-result-unit{font-size:11px;color:var(--text3);margin-left:2px;font-weight:400}

  .calc-slider-wrap{margin-top:.5rem}
  .calc-slider-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .calc-slider-label{font-size:12px;color:var(--text2);width:80px;flex-shrink:0}
  .calc-slider-val{font-size:13px;font-weight:600;color:var(--text);width:28px;text-align:right;flex-shrink:0}
  .calc-slider{flex:1}
  .calc-ratio-display{display:flex;gap:6px;margin-top:.6rem}
  .calc-ratio-box{flex:1;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r8);padding:8px 10px;text-align:center}
  .calc-ratio-name{font-size:10px;color:var(--text3);margin-bottom:3px}
  .calc-ratio-val{font-size:15px;font-weight:600;color:var(--text)}
  .calc-ratio-unit{font-size:10px;color:var(--text3)}

  .calc-warn{font-size:12px;color:var(--warn-text);background:var(--warn-bg);border-left:2px solid var(--warn-border);border-radius:0 var(--r8) var(--r8) 0;padding:8px 11px;margin-top:.75rem;line-height:1.55}

  /* 메모 탭 */
  .memo-tab-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .memo-tab-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
  .memo-tab-add{font-size:13px;padding:6px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .12s}
  .memo-tab-add:hover{background:var(--bg2)}
  .memo-list{display:flex;flex-direction:column;gap:8px}
  .memo-item{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r12);padding:1rem 1.1rem;cursor:pointer;transition:background .1s;position:relative}
  .memo-item:hover{background:var(--bg2)}
  .memo-item-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;padding-right:28px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .memo-item-preview{font-size:12px;color:var(--text3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .memo-item-date{font-size:11px;color:var(--text3);margin-top:8px}
  .memo-item-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;-webkit-tap-highlight-color:transparent}
  .memo-item-del:hover{background:var(--bg3);color:var(--text)}
  .memo-empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-size:14px}

  .memo-editor{display:none}
  .memo-editor.on{display:block}
  .memo-editor-nav{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
  .memo-editor-back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:0.5px solid var(--border);border-radius:var(--r8);padding:6px 12px;-webkit-tap-highlight-color:transparent}
  .memo-editor-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .memo-editor-confirm{font-size:13px;font-weight:600;padding:6px 16px;border-radius:20px;border:none;background:var(--text);color:var(--bg);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .12s}
  .memo-editor-confirm:hover{opacity:.8}
  .memo-editor-saved{font-size:11px;color:var(--text3);margin-left:auto;opacity:0;transition:opacity .4s}
  .memo-editor-saved.show{opacity:1}
  .memo-title-input{width:100%;font-size:18px;font-weight:600;color:var(--text);background:transparent;border:none;outline:none;margin-bottom:.75rem;padding:0;-webkit-appearance:none}
  .memo-title-input::placeholder{color:var(--text3)}
  .memo-divider{height:0.5px;background:var(--border);margin-bottom:.75rem}
  .memo-body-input{width:100%;min-height:360px;font-size:16px;color:var(--text);background:transparent;border:none;outline:none;resize:none;line-height:1.7;padding:0;-webkit-appearance:none;font-family:inherit}
  .memo-body-input::placeholder{color:var(--text3)}

  .paper-list{display:flex;flex-direction:column;gap:6px}
  .paper-item{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r8);padding:10px 13px}
  .paper-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
  .paper-note{font-size:12px;color:var(--text3);line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <!-- 공통 헤더 -->
  <div class="hd">
    <div class="hd-title" onclick="goMainHome()">Vintage Print<br>Handbook</div>
  </div>

  <!-- 탭 바 -->
  <div class="tab-bar">
    <button class="tab-btn on" id="tabTech" onclick="switchTab(0)">기법</button>
    <button class="tab-btn" id="tabRef" onclick="switchTab(1)">참고자료</button>
    <button class="tab-btn" id="tabCalc" onclick="switchTab(2)">계산기</button>
    <button class="tab-btn" id="tabMemo" onclick="switchTab(3)">메모</button>
  </div>

  <!-- 슬라이더 래퍼 -->
  <div class="tab-slider-wrap" id="sliderWrap">
    <div class="tab-slider" id="tabSlider" style="width:400%">

      <!-- 기법 탭 (pane 0) -->
      <div class="tab-pane" style="width:25%">
        <div id="homeView">
          <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
            <input type="text" placeholder="기법 검색…" oninput="doSearch(this.value)">
          </div>
          <div class="filters" id="filters"></div>
          <div class="grid" id="grid"></div>
        </div>
        <div class="detail" id="detailView">
          <div class="det-nav">
            <button class="det-back" onclick="goHome()">
              <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>목록
            </button>
            <span class="det-sep">/</span>
            <span class="det-crumb" id="detCrumb"></span>
          </div>
          <div id="detBody"></div>
        </div>
      </div>

      <!-- 참고자료 탭 (pane 1) -->
      <div class="tab-pane" style="width:25%">
        <div id="refView">
          <div class="ref-filters" id="refFilters"></div>
          <div class="ref-grid" id="refGrid"></div>
        </div>
        <div class="ref-detail" id="refDetailView">
          <div class="det-nav">
            <button class="det-back" onclick="goRefHome()">
              <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>참고자료
            </button>
            <span class="det-sep">/</span>
            <span class="det-crumb" id="refDetCrumb"></span>
          </div>
          <div id="refDetBody"></div>
        </div>

const CATS=['전체','크로메이트','철염','귀금속','은염'];
let activeCat='전체', searchQ='';

function loadMemo(id){
  try { return localStorage.getItem('vph_memo_'+id) || ''; } catch(e){ return ''; }
}

let memoTimer = null;
function saveMemo(id, val){
  try { localStorage.setItem('vph_memo_'+id, val); } catch(e){}
  const el = document.getElementById('memoSaved');
  if(!el) return;
  clearTimeout(memoTimer);
  el.classList.add('show');
  memoTimer = setTimeout(()=>{ el.classList.remove('show'); }, 1800);
}

function toggleIng(id){
  const row = document.getElementById(id);
  if(!row) return;
  row.classList.toggle('open');
}

function normalize(s){ return s.replace(/\s+/g,'').toLowerCase(); }

function buildFilters(){
  document.getElementById('filters').innerHTML=CATS.map(c=>
    `<span class="ftag${c==='전체'?' on':''}" onclick="setCat('${c}',this)">${c}</span>`
  ).join('');
}
function setCat(c,el){
  activeCat=c;
  document.querySelectorAll('.ftag').forEach(f=>f.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
}
function doSearch(q){ searchQ=normalize(q); renderGrid(); }
function filtered(){
  return DATA.filter(p=>{
    const mc = activeCat==='전체' || p.cat===activeCat;
    const mq = !searchQ ||
      normalize(p.name).includes(searchQ) ||
      normalize(p.en).includes(searchQ) ||
      normalize(p.desc).includes(searchQ) ||
      normalize(p.cat).includes(searchQ);
    return mc && mq;
  });
}

function renderGrid(){
  const list=filtered();
  const grid=document.getElementById('grid');
  if(!list.length){
    grid.style.background='transparent';
    grid.innerHTML='<div class="empty">검색 결과가 없습니다</div>';
    return;
  }
  // 카드가 그리드를 꽉 채우지 않을 때 빈 셀 회색 방지
  // grid background를 투명으로 두고 카드 자체 border로만 구분
  grid.style.background='var(--bg)';
  grid.innerHTML=list.map(p=>{
    const c=CC[p.cat]||'#888';
    const hasMemo = !!(loadMemo(p.id));
    const calSvg=`<svg class="pcard-foot-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
    const timeSvg=`<svg class="pcard-foot-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>`;
    const diffSvg=`<svg class="pcard-foot-icon" viewBox="0 0 24 24"><line x1="4" y1="20" x2="4" y2="14"/><line x1="10" y1="20" x2="10" y2="10"/><line x1="16" y1="20" x2="16" y2="4"/><line x1="22" y1="20" x2="22" y2="8"/></svg>`;
    return `<div class="pcard" onclick="openDetail('${p.id}')">
      <div class="pcard-top">
        <div class="pcard-titles">
          <div class="pcard-name">${p.name}${hasMemo?'<span class="memo-dot"></span>':''}</div>
          <div class="pcard-en">${p.en}</div>
        </div>
        <div class="pcard-dot" style="background:${c}"></div>
      </div>
      <div class="pcard-desc">${p.desc}</div>
      <div class="pcard-foot">
        <span class="pcard-foot-item">${calSvg}${p.year}</span>
        <span class="pcard-foot-item">${timeSvg}${p.time}</span>
        <span class="pcard-foot-item">${diffSvg}${p.diff}</span>
      </div>
    </div>`;
  }).join('');

  // 빈 셀: 배경색 동일한 더미 채우기
  const w = grid.offsetWidth;
  const cols = w >= 760 ? 3 : w >= 520 ? 2 : 1;
  const rem = list.length % cols;
  if(rem !== 0){
    const fill = cols - rem;
    for(let i=0;i<fill;i++){
      const d=document.createElement('div');
      d.style.cssText='background:var(--bg);border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border)';
      grid.appendChild(d);
    }
  }
}

let currentTab = 0;

function switchTab(idx){
  currentTab = idx;
  ['tabTech','tabRef','tabCalc','tabMemo'].forEach((id,i)=>
    document.getElementById(id).classList.toggle('on', i===idx));
  const pct = idx * (-100/4);
  document.getElementById('tabSlider').style.transform = `translateX(${pct}%)`;
  if(idx===1) renderRefGrid();
  if(idx===2) renderCalc();
  if(idx===3) renderMemoTab();
  window.scrollTo(0,0);
}

/* 스와이프 제스처 */
(function(){
  const wrap = document.getElementById('sliderWrap');
  let startX=0, startY=0, moved=false, locked=false;
  wrap.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false; locked = false;
  }, {passive:true});
  wrap.addEventListener('touchmove', e=>{
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if(!locked){
      if(Math.abs(dy) > Math.abs(dx)){ locked = true; return; }
      locked = true;
    }
    if(Math.abs(dy) > Math.abs(dx)) return;
    moved = true;
  }, {passive:true});
  wrap.addEventListener('touchend', e=>{
    if(!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    if(dx < 0 && currentTab < 3) switchTab(currentTab + 1);
    else if(dx > 0 && currentTab > 0) switchTab(currentTab - 1);
  }, {passive:true});
})();

function calcGum(){
  const total = parseFloat(document.getElementById('g_total').value)||24;
  const half = total/2;
  // 수채물감: 감광액 총량의 약 5–8% 무게 기준 (총량 24ml 기준 약 1–2g)
  const pigment = total * 0.06;
  document.getElementById('g_res1').innerHTML = `
    <div class="calc-result-card"><div class="calc-result-name">아라비아 고무액</div><div class="calc-result-val">${fmt(half)}<span class="calc-result-unit">ml</span></div></div>
    <div class="calc-result-card"><div class="calc-result-name">중크롬산염 용액</div><div class="calc-result-val">${fmt(half)}<span class="calc-result-unit">ml</span></div></div>
    <div class="calc-result-card"><div class="calc-result-name">수채물감 (기준)</div><div class="calc-result-val">${fmt(pigment)}<span class="calc-result-unit">g</span></div></div>`;
}
function calcGumRatio(){
  const gr = parseInt(document.getElementById('g_gum_r').value);
  const dr = parseInt(document.getElementById('g_dic_r').value);
  document.getElementById('g_gum_v').textContent = gr;
  document.getElementById('g_dic_v').textContent = dr;
  const total = gr + dr;
  document.getElementById('g_ratio').innerHTML = `
    <div class="calc-ratio-box"><div class="calc-ratio-name">아라비아 고무</div><div class="calc-ratio-val">${gr}<span class="calc-ratio-unit"> drops</span></div></div>
    <div class="calc-ratio-box"><div class="calc-ratio-name">중크롬산염</div><div class="calc-ratio-val">${dr}<span class="calc-ratio-unit"> drops</span></div></div>
    <div class="calc-ratio-box"><div class="calc-ratio-name">비율</div><div class="calc-ratio-val">${gr}:${dr}</div></div>`;
  let tip = '';
  if(gr > dr) tip = `고무 비율↑ → 콘트라스트 강화, 현상 시간 길어짐`;
  else if(dr > gr) tip = `감광액 비율↑ → 감광 속도↑, 콘트라스트↓`;
  else tip = `1:1 기본 비율 — 가장 균형 잡힌 설정`;
  document.getElementById('g_ratio_tip').textContent = tip;
}
function calcGumConc(){
  const conc = parseFloat(document.getElementById('g_conc').value)||10;
  const vol = parseFloat(document.getElementById('g_conc_vol').value)||100;
  const solute = vol * conc / 100;
  const solvent = vol - solute;

    <div class="calc-result-card"><div class="calc-result-name">중크롬산암모늄</div><div class="calc-result-val">${fmt(solute)}<span class="calc-result-unit">g</span></div></div>

/* ══════════════════════════════
   메모 탭
══════════════════════════════ */
const MEMO_KEY = 'vph_memos_v1';
let memoEditingId = null;
let memoSaveTimer = null;

function loadMemos(){
  try { return JSON.parse(localStorage.getItem(MEMO_KEY)) || []; } catch(e){ return []; }
}
function saveMemos(list){
  try { localStorage.setItem(MEMO_KEY, JSON.stringify(list)); } catch(e){}
}
function genId(){ return 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }
function fmtDate(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderMemoTab(){
  const el = document.getElementById('memoTabView');
  const list = loadMemos();

  // 목록 뷰와 에디터 뷰를 완전히 분리해서 렌더
  el.innerHTML = '';

  // ── 목록 뷰 ──
  const listView = document.createElement('div');
  listView.id = 'memoListView';

  const header = document.createElement('div');
  header.className = 'memo-tab-header';
  header.innerHTML = `
    <span class="memo-tab-title">메모${list.length > 0 ? ' ' + list.length + '개' : ''}</span>
    <button class="memo-tab-add">+ 새 메모</button>`;
  header.querySelector('.memo-tab-add').addEventListener('click', ()=>openMemoEditor(null));
  listView.appendChild(header);

  if(list.length === 0){
    const empty = document.createElement('div');
    empty.className = 'memo-empty';
    empty.innerHTML = '아직 메모가 없어요.<br>새 메모를 작성해보세요.';
    listView.appendChild(empty);
  } else {
    const memoList = document.createElement('div');
    memoList.className = 'memo-list';
    list.forEach(m=>{
      const item = document.createElement('div');
      item.className = 'memo-item';

      const titleEl = document.createElement('div');
      titleEl.className = 'memo-item-title';
      titleEl.textContent = m.title || '제목 없음';

      const previewEl = document.createElement('div');
      previewEl.className = 'memo-item-preview';
      previewEl.textContent = m.body || '내용 없음';

      const dateEl = document.createElement('div');
      dateEl.className = 'memo-item-date';
      dateEl.textContent = fmtDate(m.updatedAt);

      const delBtn = document.createElement('button');
      delBtn.className = 'memo-item-del';
      delBtn.setAttribute('aria-label', '삭제');
      delBtn.textContent = '×';
      delBtn.addEventListener('click', e=>{
        e.stopPropagation();
        deleteMemo(m.id);
      });

      item.appendChild(titleEl);
      item.appendChild(previewEl);
      item.appendChild(dateEl);
      item.appendChild(delBtn);
      item.addEventListener('click', ()=>openMemoEditor(m.id));
      memoList.appendChild(item);
    });
    listView.appendChild(memoList);
  }

  // ── 에디터 뷰 ──
  const editorView = document.createElement('div');
  editorView.className = 'memo-editor';
  editorView.id = 'memoEditorView';

  const nav = document.createElement('div');
  nav.className = 'memo-editor-nav';

  const backBtn = document.createElement('button');
  backBtn.className = 'memo-editor-back';
  backBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>목록`;
  backBtn.addEventListener('click', closeMemoEditor);

  const savedSpan = document.createElement('span');
  savedSpan.className = 'memo-editor-saved';
  savedSpan.id = 'memoEditorSaved';
  savedSpan.textContent = '저장됨';

  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'memo-editor-confirm';
  confirmBtn.textContent = '확인';
  confirmBtn.addEventListener('click', confirmMemo);

  nav.appendChild(backBtn);
  nav.appendChild(savedSpan);
  nav.appendChild(confirmBtn);

  const titleInput = document.createElement('input');
  titleInput.className = 'memo-title-input';
  titleInput.id = 'memoTitleInput';
  titleInput.type = 'text';
  titleInput.placeholder = '제목';
  titleInput.maxLength = 80;
  titleInput.addEventListener('input', autoSaveMemo);

  const divider = document.createElement('div');
  divider.className = 'memo-divider';

  const bodyInput = document.createElement('textarea');
  bodyInput.className = 'memo-body-input';
  bodyInput.id = 'memoBodyInput';
  bodyInput.placeholder = '내용을 입력하세요…';
  bodyInput.addEventListener('input', autoSaveMemo);

  editorView.appendChild(nav);
  editorView.appendChild(titleInput);
  editorView.appendChild(divider);
  editorView.appendChild(bodyInput);

  el.appendChild(listView);
  el.appendChild(editorView);
}

function openMemoEditor(id){
  const listView   = document.getElementById('memoListView');
  const editorView = document.getElementById('memoEditorView');
  if(!listView || !editorView) return;

  if(id){
    memoEditingId = id;
    const memo = loadMemos().find(m=>m.id===id);
    if(memo){
      document.getElementById('memoTitleInput').value = memo.title || '';
      document.getElementById('memoBodyInput').value  = memo.body  || '';
    }
  } else {
    const newMemo = {id:genId(), title:'', body:'', createdAt:Date.now(), updatedAt:Date.now()};
    memoEditingId = newMemo.id;
    const list = loadMemos();
    list.unshift(newMemo);
    saveMemos(list);
    document.getElementById('memoTitleInput').value = '';
    document.getElementById('memoBodyInput').value  = '';
  }

  listView.style.display   = 'none';
  editorView.classList.add('on');
  setTimeout(()=>{ const t=document.getElementById('memoTitleInput'); if(t) t.focus(); }, 80);
  window.scrollTo(0,0);
}

function closeMemoEditor(){
  clearTimeout(memoSaveTimer);
  if(memoEditingId){
    const list  = loadMemos();
    const idx   = list.findIndex(m=>m.id===memoEditingId);
    const title = (document.getElementById('memoTitleInput')||{}).value || '';
    const body  = (document.getElementById('memoBodyInput') ||{}).value || '';
    if(idx >= 0){
      if(!title && !body){
        saveMemos(list.filter(m=>m.id!==memoEditingId));
      } else {
        list[idx].title = title;
        list[idx].body  = body;
        list[idx].updatedAt = Date.now();
        saveMemos(list);
      }
    }
  }
  memoEditingId = null;
  renderMemoTab();
}

function confirmMemo(){
  clearTimeout(memoSaveTimer);
  if(!memoEditingId) return;
  const list  = loadMemos();
  const idx   = list.findIndex(m=>m.id===memoEditingId);
  const title = (document.getElementById('memoTitleInput')||{}).value || '';
  const body  = (document.getElementById('memoBodyInput') ||{}).value || '';
  if(idx >= 0){
    list[idx].title = title;
    list[idx].body  = body;
    list[idx].updatedAt = Date.now();
    saveMemos(list);
  }
  const saved = document.getElementById('memoEditorSaved');
  if(saved){ saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 1600); }
  memoEditingId = null;
  renderMemoTab();
}

function autoSaveMemo(){
  clearTimeout(memoSaveTimer);
  memoSaveTimer = setTimeout(()=>{
    if(!memoEditingId) return;
    const list  = loadMemos();
    const idx   = list.findIndex(m=>m.id===memoEditingId);
    const title = (document.getElementById('memoTitleInput')||{}).value || '';
    const body  = (document.getElementById('memoBodyInput') ||{}).value || '';
    if(idx >= 0){
      list[idx].title = title;
      list[idx].body  = body;
      list[idx].updatedAt = Date.now();
    } else {
      list.unshift({id:memoEditingId, title, body, createdAt:Date.now(), updatedAt:Date.now()});
    }
    saveMemos(list);
    const saved = document.getElementById('memoEditorSaved');
    if(saved){ saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 1600); }
  }, 600);
}

function deleteMemo(id){
  saveMemos(loadMemos().filter(m=>m.id!==id));
  renderMemoTab();
}

buildRefFilters();
buildFilters();
renderGrid();
window.addEventListener('resize', ()=>{ renderGrid(); });
